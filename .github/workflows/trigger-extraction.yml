name: Trigger Databricks Extraction

on:
  push:
    branches:
      - main
    paths:
      - 'miral-hotel-investment-analysis/documents/**'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  trigger-extraction:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Databricks Job
        id: trigger
        run: |
          RUN_ID=$(curl -sf -X POST \
            "${{ secrets.DATABRICKS_HOST }}/api/2.1/jobs/run-now" \
            -H "Authorization: Bearer ${{ secrets.DATABRICKS_PAT }}" \
            -H "Content-Type: application/json" \
            -d "{\"job_id\": ${{ secrets.DATABRICKS_EXTRACTION_JOB_ID }}}" \
            | jq -r '.run_id')

          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Triggered Databricks Job. Run ID: $RUN_ID"

      - name: Wait for job completion
        run: |
          RUN_ID="${{ steps.trigger.outputs.run_id }}"
          echo "Polling job run $RUN_ID..."

          for i in $(seq 1 40); do
            RESPONSE=$(curl -sf \
              "${{ secrets.DATABRICKS_HOST }}/api/2.1/jobs/runs/get?run_id=$RUN_ID" \
              -H "Authorization: Bearer ${{ secrets.DATABRICKS_PAT }}")

            STATE=$(echo "$RESPONSE" | jq -r '.state.life_cycle_state')
            RESULT=$(echo "$RESPONSE" | jq -r '.state.result_state // "PENDING"')

            echo "  [$i/40] State: $STATE | Result: $RESULT"

            if [[ "$STATE" == "TERMINATED" ]]; then
              if [[ "$RESULT" == "SUCCESS" ]]; then
                echo "✓ Extraction job completed successfully."
                exit 0
              else
                echo "✗ Extraction job failed. Result: $RESULT"
                exit 1
              fi
            fi

            sleep 30
          done

          echo "✗ Timed out waiting for job completion (20 min)."
          exit 1
